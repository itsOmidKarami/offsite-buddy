---
- name: Validate existing_path quota items
  ansible.builtin.include_tasks: existing_path.yml
  loop: "{{ offsitebuddy_quota_items }}"
  loop_control:
    loop_var: offsitebuddy_quota_item
    label: >-
      {{
        offsitebuddy_quota_item.name
        | default(offsitebuddy_quota_item.path)
        | default('quota-item')
      }}
