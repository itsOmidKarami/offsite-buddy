---
- name: Validate quota backend is existing_path
  ansible.builtin.assert:
    that:
      - offsitebuddy_quota_item.backend == 'existing_path'
      - offsitebuddy_quota_item.path is defined
      - offsitebuddy_quota_item.size is defined
      - offsitebuddy_quota_item.enforced | bool
      - offsitebuddy_quota_item.enforcement_note is defined
    fail_msg: >-
      existing_path quota requires path, size, enforced=true, and
      enforcement_note.

- name: Stat existing quota path
  ansible.builtin.stat:
    path: "{{ offsitebuddy_quota_item.path }}"
  register: offsitebuddy_quota_path_stat

- name: Assert quota path exists and is a directory
  ansible.builtin.assert:
    that:
      - offsitebuddy_quota_path_stat.stat.exists
      - offsitebuddy_quota_path_stat.stat.isdir
    fail_msg: >-
      Quota path {{ offsitebuddy_quota_item.path }} must already exist
      and be a directory.

- name: Probe quota path writability
  ansible.builtin.tempfile:
    state: file
    path: "{{ offsitebuddy_quota_item.path }}"
    prefix: .offsitebuddy-write-probe-
  register: offsitebuddy_quota_write_probe

- name: Remove quota write probe
  ansible.builtin.file:
    path: "{{ offsitebuddy_quota_write_probe.path }}"
    state: absent
