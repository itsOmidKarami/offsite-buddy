---
- name: Validate offsitebuddy_client_jobs is a list
  ansible.builtin.assert:
    that:
      - offsitebuddy_client_jobs | type_debug == 'list'
    fail_msg: >-
      offsitebuddy_client_jobs must be a list of backup job declarations.

- name: Validate each client job
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | regex_search('^[a-z][a-z0-9_-]*$') is not none
      - item.repository is defined
      - item.repository is string
      - item.repository | regex_search('\s') is none
      - >-
        item.repository is match('^/') or
        (
          ':' in item.repository and
          item.repository.split(':', 1)[0] in
          offsitebuddy_client_supported_repository_schemes
        )
      - >-
        item.repository is not match('^/') or
        '..' not in item.repository.split('/')
      - item.password is defined
      - item.schedule is defined
      - >-
        item.schedule | regex_search('^([01][0-9]|2[0-3]):[0-5][0-9]$')
        is not none
      - item.backup_paths is defined
      - item.backup_paths | type_debug == 'list'
      - item.backup_paths | length > 0
      - >-
        item.backup_paths | select('match', '^/') | list | length ==
        item.backup_paths | length
      - >-
        item.backup_paths | reject('search', '(^|/)\.\.(/|$)') | list |
        length == item.backup_paths | length
      - item.excludes is not defined or item.excludes | type_debug == 'list'
      - >-
        item.excludes is not defined or
        item.excludes | select('string') | list | length ==
        item.excludes | length
      - >-
        item.excludes is not defined or
        item.excludes | select('match', '^/') | list | length ==
        item.excludes | length
      - >-
        item.excludes is not defined or
        item.excludes | reject('search', '(^|/)\.\.(/|$)') | list | length ==
        item.excludes | length
      - item.check is not defined or item.check is mapping
    fail_msg: >-
      Each client job needs name, repository, password, HH:MM schedule,
      supported repository scheme or absolute local repository, absolute
      backup_paths without traversal segments, optional absolute excludes
      without traversal segments, and an optional check mapping. REST URLs with
      embedded credentials must already be url-encoded.
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  no_log: true
  vars:
    offsitebuddy_client_supported_repository_schemes:
      - rest
      - sftp
      - s3
      - b2
      - azure
      - gs
      - swift
      - rclone

- name: Validate client job names are unique
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_client_jobs | map(attribute='name') | list | unique
        | length == offsitebuddy_client_jobs | length
    fail_msg: >-
      offsitebuddy_client_jobs names must be unique.

- name: Stat client backup paths
  ansible.builtin.stat:
    path: "{{ item.1 }}"
  loop: "{{ offsitebuddy_client_jobs | subelements('backup_paths') }}"
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"
  register: offsitebuddy_client_backup_path_stats

- name: Assert client backup paths exist and are directories
  ansible.builtin.assert:
    that:
      - item.stat.exists
      - item.stat.isdir
    fail_msg: >-
      Backup path {{ item.item.1 }} for job {{ item.item.0.name }}
      must exist and be a directory.
  loop: "{{ offsitebuddy_client_backup_path_stats.results }}"
  loop_control:
    label: "{{ item.item.0.name }} {{ item.item.1 }}"

- name: Validate local repository paths do not overlap backup paths
  ansible.builtin.assert:
    that:
      - >-
        not (
          item.0.repository == item.1 or
          item.0.repository is match('^' ~ (item.1 | regex_escape) ~ '/') or
          item.1 is match('^' ~ (item.0.repository | regex_escape) ~ '/')
        )
    fail_msg: >-
      Local repository {{ item.0.repository }} for job {{ item.0.name }}
      must not overlap backup path {{ item.1 }}.
  loop: "{{ offsitebuddy_client_jobs | subelements('backup_paths') }}"
  loop_control:
    label: "{{ item.0.name }} {{ item.0.repository }} {{ item.1 }}"
  when: item.0.repository is match('^/')
  no_log: true
  vars:
    offsitebuddy_client_repo_source_overlaps: true

- name: Validate excludes do not cover backup paths
  ansible.builtin.assert:
    that:
      - >-
        item.0.backup_paths
        | select('match', '^' ~ (item.1 | regex_escape) ~ '(/|$)')
        | list | length == 0
    fail_msg: >-
      Exclude {{ item.1 }} for job {{ item.0.name }} must not cover a
      configured backup path.
  loop: >-
    {{
      offsitebuddy_client_jobs
      | subelements('excludes', skip_missing=True)
    }}
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"
  no_log: true
  vars:
    offsitebuddy_client_exclude_source_overlaps: true

- name: Check systemd-analyze availability
  ansible.builtin.command:
    cmd: systemd-analyze --version
  register: offsitebuddy_systemd_analyze_check
  failed_when: false
  changed_when: false

- name: Validate check timer schedules with systemd-analyze calendar
  ansible.builtin.command:
    argv:
      - systemd-analyze
      - calendar
      - "{{ (item.check | default({})).schedule | default('weekly') }}"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    label: "{{ item.name }}"
  when:
    - offsitebuddy_systemd_analyze_check.rc == 0
    - (item.check | default({})).enabled | default(true) | bool
  changed_when: false
