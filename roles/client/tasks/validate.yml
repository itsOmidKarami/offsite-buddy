---
- name: Validate offsitebuddy_client_jobs is a list
  ansible.builtin.assert:
    that:
      - offsitebuddy_client_jobs | type_debug == 'list'
      - offsitebuddy_client_jobs is not mapping
    fail_msg: >-
      offsitebuddy_client_jobs must be a list of backup job declarations.

- name: Validate each client job
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | regex_search('^[a-z][a-z0-9_-]*$') is not none
      - item.repository is defined
      - item.password is defined
      - item.schedule is defined
      - >-
        item.schedule | regex_search('^([01][0-9]|2[0-3]):[0-5][0-9]$')
        is not none
      - item.backup_paths is defined
      - item.backup_paths | type_debug == 'list'
      - item.backup_paths is not mapping
      - item.backup_paths | length > 0
      - >-
        item.backup_paths | select('match', '^/') | list | length ==
        item.backup_paths | length
      - item.retention is defined
      - item.retention.keep_daily | default(0) | int >= 0
      - item.retention.keep_weekly | default(0) | int >= 0
      - item.retention.keep_monthly | default(0) | int >= 0
      - item.check is not defined or item.check is mapping
    fail_msg: >-
      Each client job needs name, repository, password, HH:MM schedule,
      absolute backup_paths, retention, and an optional check mapping.
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  no_log: true

- name: Validate client job names are unique
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_client_jobs | map(attribute='name') | list | unique
        | length == offsitebuddy_client_jobs | length
    fail_msg: >-
      offsitebuddy_client_jobs names must be unique.
