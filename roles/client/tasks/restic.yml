---
- name: Ensure client job directories exist
  ansible.builtin.file:
    path: "{{ offsitebuddy_client_root }}/{{ job_name }}"
    state: directory
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0755"
  loop: "{{ offsitebuddy_client_jobs | map(attribute='name') | list }}"
  loop_control:
    loop_var: job_name
    label: "{{ job_name }}"

- name: Ensure client tailscale state directories exist
  ansible.builtin.file:
    path: "{{ offsitebuddy_client_root }}/{{ job_name }}/tailscale-state"
    state: directory
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0700"
  loop: >-
    {{
      offsitebuddy_client_jobs
      | selectattr('tailscale', 'defined')
      | map(attribute='name')
      | list
    }}
  loop_control:
    loop_var: job_name
    label: "{{ job_name }}"

- name: Write restic environment files
  ansible.builtin.template:
    src: env.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/.env"
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0600"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Mark managed client job directories
  ansible.builtin.copy:
    content: "offsitebuddy\n"
    dest: >-
      {{ offsitebuddy_client_root }}/{{ job_name }}/.offsitebuddy-managed
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs | map(attribute='name') | list }}"
  loop_control:
    loop_var: job_name
    label: "{{ job_name }}"

- name: Write restic password files
  ansible.builtin.copy:
    content: "{{ job.password }}\n"
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/password"
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0600"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Write restic excludes files
  ansible.builtin.template:
    src: excludes.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/excludes"
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Write restic Compose files
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/compose.yaml"
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Write restic helper scripts
  ansible.builtin.template:
    src: "{{ helper }}.j2"
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/{{ helper }}"
    owner: "{{ offsitebuddy_client_owner }}"
    group: "{{ offsitebuddy_client_group }}"
    mode: "0750"
  loop: >-
    {{
      offsitebuddy_client_jobs
      | product([
          'backup.sh',
          'init.sh',
          'check.sh',
          'restore.sh',
          'restore-latest.sh',
          'snapshots.sh',
          'stats.sh'
        ])
      | list
    }}
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"
  vars:
    job: "{{ item.0 }}"
    helper: "{{ item.1 }}"
    job_check: "{{ item.0.check | default({}) }}"
  no_log: true

- name: Check for existing restic repositories
  community.docker.docker_compose_v2_run:
    project_src: "{{ offsitebuddy_client_root }}/{{ job.name }}"
    service: restic
    argv:
      - snapshots
    cleanup: true
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.init_if_missing | default(true) | bool
  register: offsitebuddy_restic_repository_check
  no_log: true
  changed_when: false
  failed_when: offsitebuddy_restic_repository_check.rc not in [0, 10]

- name: Initialize missing restic repositories
  community.docker.docker_compose_v2_run:
    project_src: "{{ offsitebuddy_client_root }}/{{ job.name }}"
    service: restic
    argv:
      - init
    cleanup: true
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    index_var: job_index
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.init_if_missing | default(true) | bool
    - >-
      (offsitebuddy_restic_repository_check.results[job_index].rc | default(0))
      == 10
  no_log: true

- name: Run initial backups
  ansible.builtin.include_tasks: initial_backup.yml
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.run_initial_backup | default(true) | bool
  no_log: true
