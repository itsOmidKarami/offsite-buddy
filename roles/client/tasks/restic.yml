---
- name: Ensure client job directories exist
  ansible.builtin.file:
    path: "{{ offsitebuddy_client_root }}/{{ job.name }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"

- name: Write restic environment files
  ansible.builtin.template:
    src: env.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/.env"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Write restic password files
  ansible.builtin.copy:
    content: "{{ job.password }}\n"
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/password"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  no_log: true

- name: Write restic excludes files
  ansible.builtin.template:
    src: excludes.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/excludes"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"

- name: Write restic Compose files
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/compose.yaml"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"

- name: Write restic helper scripts
  ansible.builtin.template:
    src: "{{ helper }}.j2"
    dest: "{{ offsitebuddy_client_root }}/{{ job.name }}/{{ helper }}"
    owner: root
    group: root
    mode: "0750"
  loop: >-
    {{
      offsitebuddy_client_jobs
      | product([
          'backup.sh',
          'init.sh',
          'check.sh',
          'restore-latest.sh',
          'snapshots.sh',
          'stats.sh'
        ])
      | list
    }}
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"
  vars:
    job: "{{ item.0 }}"
    helper: "{{ item.1 }}"

- name: Initialize missing restic repositories
  ansible.builtin.command:
    cmd: "{{ offsitebuddy_client_root }}/{{ job.name }}/init.sh"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.init_if_missing | default(true) | bool
  changed_when: "'created restic repository' in (stdout | default(''))"

- name: Run initial backup
  ansible.builtin.command:
    cmd: "{{ offsitebuddy_client_root }}/{{ job.name }}/backup.sh"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.run_initial_backup | default(true) | bool
  changed_when: true
