---
- name: Ensure client Python dependencies are installed
  ansible.builtin.apt:
    name:
      - python3-requests
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Check for legacy generic client Compose projects
  community.docker.docker_host_info:
    containers: true
    containers_all: true
    containers_filters:
      label: "com.docker.compose.project={{ job_name }}"
    networks: true
    networks_filters:
      label: "com.docker.compose.project={{ job_name }}"
  loop: "{{ offsitebuddy_client_jobs | map(attribute='name') | list }}"
  loop_control:
    loop_var: job_name
    label: "{{ job_name }}"
  register: offsitebuddy_client_legacy_compose_inspections
  no_log: true

- name: Initialize current client legacy Compose summaries
  ansible.builtin.set_fact:
    offsitebuddy_client_legacy_compose_summaries: []
  no_log: true

- name: Project current client legacy Compose inspections
  ansible.builtin.set_fact:
    offsitebuddy_client_legacy_compose_summaries: >-
      {{
        offsitebuddy_client_legacy_compose_summaries +
        [{
          'job_name': legacy_inspection.job_name,
          'container_count': legacy_inspection.containers | length,
          'network_count': legacy_inspection.networks | length
        }]
      }}
  loop: >-
    {{ offsitebuddy_client_legacy_compose_inspections.results | default([]) }}
  loop_control:
    loop_var: legacy_inspection
    label: "{{ legacy_inspection.job_name | default('skipped') }}"
  when: not legacy_inspection.skipped | default(false)
  no_log: true

- name: Refuse to replace legacy generic client Compose projects
  ansible.builtin.assert:
    that:
      - legacy_project.container_count == 0
      - legacy_project.network_count == 0
    fail_msg: >-
      Legacy Compose project {{ legacy_project.job_name }} exists
      ({{ legacy_project.container_count }} containers,
      {{ legacy_project.network_count }} networks). Inspect it and run
      docker compose --project-name {{ legacy_project.job_name }}
      --file {{
        offsitebuddy_client_root ~ '/' ~ legacy_project.job_name ~
        '/compose.yaml'
      }} down
      before rerunning; OffsiteBuddy will not remove it automatically.
  loop: "{{ offsitebuddy_client_legacy_compose_summaries | default([]) }}"
  loop_control:
    loop_var: legacy_project
    label: "{{ legacy_project.job_name }}"
