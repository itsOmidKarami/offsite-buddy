---
- name: Write backup systemd services
  ansible.builtin.template:
    src: offsitebuddy-backup.service.j2
    dest: "/etc/systemd/system/offsitebuddy-backup-{{ job.name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  notify: Reload systemd

- name: Write backup systemd timers
  ansible.builtin.template:
    src: offsitebuddy-backup.timer.j2
    dest: "/etc/systemd/system/offsitebuddy-backup-{{ job.name }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  notify: Reload systemd

- name: Write check systemd services
  ansible.builtin.template:
    src: offsitebuddy-check.service.j2
    dest: "/etc/systemd/system/offsitebuddy-check-{{ job.name }}.service"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when: job.check.enabled | default(true) | bool
  notify: Reload systemd

- name: Write check systemd timers
  ansible.builtin.template:
    src: offsitebuddy-check.timer.j2
    dest: "/etc/systemd/system/offsitebuddy-check-{{ job.name }}.timer"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when: job.check.enabled | default(true) | bool
  notify: Reload systemd

- name: Stat stale check timer files
  ansible.builtin.stat:
    path: "/etc/systemd/system/offsitebuddy-check-{{ job.name }}.timer"
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  register: stale_check_timer_stats

- name: Disable stale check timers
  ansible.builtin.systemd:
    name: "offsitebuddy-check-{{ item.0.name }}.timer"
    enabled: false
    state: stopped
    daemon_reload: true
  loop: >-
    {{
      offsitebuddy_client_jobs
      | zip(stale_check_timer_stats.results)
      | list
    }}
  loop_control:
    label: "{{ item.0.name }}"
  when:
    - offsitebuddy_start_services | bool
    - not (item.0.check.enabled | default(true) | bool)
    - item.1.stat.exists

- name: Remove stale check unit files
  ansible.builtin.file:
    path: >-
      /etc/systemd/system/offsitebuddy-check-{{ item.0.name }}.{{ item.1 }}
    state: absent
  loop: "{{ offsitebuddy_client_jobs | product(['service', 'timer']) | list }}"
  loop_control:
    label: "{{ item.0.name }} {{ item.1 }}"
  when:
    - offsitebuddy_start_services | bool
    - not (item.0.check.enabled | default(true) | bool)
  notify: Reload systemd

- name: Enable backup timers
  ansible.builtin.systemd:
    name: "offsitebuddy-backup-{{ job.name }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when: offsitebuddy_start_services | bool

- name: Enable check timers
  ansible.builtin.systemd:
    name: "offsitebuddy-check-{{ job.name }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ offsitebuddy_client_jobs }}"
  loop_control:
    loop_var: job
    label: "{{ job.name }}"
  when:
    - offsitebuddy_start_services | bool
    - job.check.enabled | default(true) | bool
