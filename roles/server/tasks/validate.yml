---
- name: Validate offsitebuddy_friends is a list
  ansible.builtin.assert:
    that:
      - offsitebuddy_friends | type_debug == 'list'
    fail_msg: >-
      offsitebuddy_friends must be a list of friend declarations.

- name: Validate server root path
  ansible.builtin.assert:
    that:
      - offsitebuddy_server_root is string
      - offsitebuddy_server_root | regex_search('^/') is not none
      - "'..' not in offsitebuddy_server_root.split('/')"
      - offsitebuddy_server_root != '/'
      - offsitebuddy_server_root is not match('^.+/$')
    fail_msg: >-
      offsitebuddy_server_root must be an absolute managed server root without
      root, trailing slash, or traversal segments.

- name: Validate stale server cleanup can stop managed stacks
  ansible.builtin.assert:
    that:
      - not offsitebuddy_cleanup_stale | bool or offsitebuddy_start_services | bool  # yamllint disable-line rule:line-length
    fail_msg: >-
      offsitebuddy_cleanup_stale requires offsitebuddy_start_services=true so
      stale Compose projects are stopped before their files are removed.

- name: Validate friend rest-server access modes
  vars:
    offsitebuddy_mode_friend: "{{ offsitebuddy_friends[friend_index] }}"
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_mode_friend.rest_server is not defined or
        offsitebuddy_mode_friend.rest_server is not mapping or
        offsitebuddy_mode_friend.rest_server.mode is not defined or
        (
          offsitebuddy_mode_friend.rest_server.mode is string and
          offsitebuddy_mode_friend.rest_server.mode
          in ['append_only', 'read_write']
        )
    fail_msg: >-
      Friend {{ offsitebuddy_mode_friend.name | default('unnamed') }}
      rest_server.mode must be append_only or read_write.
  loop: "{{ range(0, offsitebuddy_friends | length) | list }}"
  loop_control:
    loop_var: friend_index
    label: >-
      {{ offsitebuddy_mode_friend.name | default('unnamed') }}

- name: Validate each friend declaration
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | regex_search('^[a-z][a-z0-9_-]*$') is not none
      - item.quota is defined
      - item.quota.path is defined
      - item.quota.path is string
      - item.quota.path | regex_search('^/') is not none
      - "'..' not in item.quota.path.split('/')"
      - item.quota.path != '/'
      - item.quota.path is not match('^.+/$')
      - item.quota.enforced | default(false) | bool
      - item.quota.enforcement_note is defined
      - item.tailscale is defined
      - item.tailscale.hostname is defined
      - item.tailscale.hostname is string
      - >-
        item.tailscale.hostname | regex_search(
          '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?$'
        ) is not none
      - item.tailscale.auth_key is defined
      - item.tailscale.auth_key is string
      - item.tailscale.auth_key | length > 0
      - item.rest_server is defined
      - item.rest_server.username is defined
      - item.rest_server.username is string
      - item.rest_server.username | length > 0
      - item.rest_server.username | regex_search('[:\s]') is none
      - item.rest_server.password is defined
      - item.rest_server.password is string
      - item.rest_server.password | length > 0
      - >-
        item.rest_server.port is not defined or
        item.rest_server.port | string is match('^[0-9]+$')
      - item.rest_server.port | default(8000) | int > 0
      - item.rest_server.port | default(8000) | int < 65536
    fail_msg: >-
      Each friend needs name, absolute quota path without root, trailing slash,
      or traversal segments and with enforced=true, valid Tailscale auth, and
      rest-server credentials.
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    label: "{{ item.name | default('missing-name') }}"
  no_log: true

- name: Validate friend names are unique
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_friends | map(attribute='name') | list | unique
        | length == offsitebuddy_friends | length
    fail_msg: >-
      offsitebuddy_friends names must be unique.

- name: Initialize append-only maintenance project identities
  ansible.builtin.set_fact:
    offsitebuddy_append_only_maintenance_project_names: []
  no_log: true

- name: Collect append-only maintenance project identities
  ansible.builtin.set_fact:
    offsitebuddy_append_only_maintenance_project_names: >-
      {{
        offsitebuddy_append_only_maintenance_project_names +
        ['offsitebuddy-maintenance-friend-' ~ maintenance_identity_friend.name]
      }}
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    loop_var: maintenance_identity_friend
    label: "{{ maintenance_identity_friend.name }}"
  when: >-
    (maintenance_identity_friend.rest_server.mode | default('append_only'))
    == 'append_only'
  no_log: true

- name: Validate friend names do not shadow Compose project names
  vars:
    offsitebuddy_friend_names: >-
      {{ offsitebuddy_friends | map(attribute='name') | list }}
    offsitebuddy_friend_project_names: >-
      {{
        offsitebuddy_friend_names |
        map('regex_replace', '^', 'offsitebuddy-friend-') | list
      }}
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_friend_names |
        intersect(offsitebuddy_friend_project_names) | length == 0
    fail_msg: >-
      A friend name must not equal another friend's
      offsitebuddy-friend-<name> Compose project identity.

- name: Validate friend names do not shadow append-only maintenance projects
  vars:
    offsitebuddy_friend_names: >-
      {{ offsitebuddy_friends | map(attribute='name') | list }}
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_friend_names |
        intersect(offsitebuddy_append_only_maintenance_project_names) | length
        == 0
    fail_msg: >-
      A friend name must not equal an append-only maintenance Compose project
      identity.

- name: Validate friend quota paths are unique
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_friends | map(attribute='quota.path') | list | unique
        | length == offsitebuddy_friends | length
    fail_msg: >-
      offsitebuddy_friends quota paths must be unique.

- name: Validate friend quota paths do not overlap managed server root
  ansible.builtin.assert:
    that:
      - >-
        not (
          item.quota.path == offsitebuddy_server_root or
          item.quota.path is match(
            '^' ~ (offsitebuddy_server_root | regex_escape) ~ '/'
          ) or
          offsitebuddy_server_root is match(
            '^' ~ (item.quota.path | regex_escape) ~ '/'
          )
        )
    fail_msg: >-
      Quota path {{ item.quota.path }} for friend {{ item.name }} must not
      overlap managed server root {{ offsitebuddy_server_root }}.
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    label: "{{ item.name }} {{ item.quota.path }}"
  no_log: true

- name: Validate friend quota paths do not overlap each other
  ansible.builtin.assert:
    that:
      - >-
        not (
          item.0.quota.path == item.1.quota.path or
          item.0.quota.path is match(
            '^' ~ (item.1.quota.path | regex_escape) ~ '/'
          ) or
          item.1.quota.path is match(
            '^' ~ (item.0.quota.path | regex_escape) ~ '/'
          )
        )
    fail_msg: >-
      Quota path {{ item.0.quota.path }} for friend {{ item.0.name }} must not
      overlap quota path {{ item.1.quota.path }} for friend {{ item.1.name }}.
  loop: "{{ offsitebuddy_friends | product(offsitebuddy_friends) | list }}"
  loop_control:
    label: "{{ item.0.name }} {{ item.1.name }}"
  when: item.0.name < item.1.name
  no_log: true

- name: Validate friend Tailscale hostnames are unique
  ansible.builtin.assert:
    that:
      - >-
        offsitebuddy_friends | map(attribute='tailscale.hostname') | list
        | unique | length == offsitebuddy_friends | length
    fail_msg: >-
      offsitebuddy_friends Tailscale hostnames must be unique.
