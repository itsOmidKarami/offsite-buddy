---
- name: Ensure server Python dependencies are installed
  ansible.builtin.apt:
    name:
      - python3-passlib
      - python3-requests
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Check for legacy generic friend Compose projects
  community.docker.docker_host_info:
    containers: true
    containers_all: true
    containers_filters:
      label: "com.docker.compose.project={{ friend_name }}"
    networks: true
    networks_filters:
      label: "com.docker.compose.project={{ friend_name }}"
  loop: "{{ offsitebuddy_friends | map(attribute='name') | list }}"
  loop_control:
    loop_var: friend_name
    label: "{{ friend_name }}"
  register: offsitebuddy_server_legacy_compose_inspections
  no_log: true

- name: Initialize current legacy Compose summaries
  ansible.builtin.set_fact:
    offsitebuddy_server_legacy_compose_summaries: []
  no_log: true

- name: Project current legacy Compose inspections
  ansible.builtin.set_fact:
    offsitebuddy_server_legacy_compose_summaries: >-
      {{
        offsitebuddy_server_legacy_compose_summaries +
        [{
          'friend_name': legacy_inspection.friend_name,
          'container_count': legacy_inspection.containers | length,
          'network_count': legacy_inspection.networks | length
        }]
      }}
  loop: >-
    {{ offsitebuddy_server_legacy_compose_inspections.results | default([]) }}
  loop_control:
    loop_var: legacy_inspection
    label: "{{ legacy_inspection.friend_name | default('skipped') }}"
  when: not legacy_inspection.skipped | default(false)
  no_log: true

- name: Refuse to replace legacy generic friend Compose projects
  ansible.builtin.assert:
    that:
      - legacy_project.container_count == 0
      - legacy_project.network_count == 0
    fail_msg: >-
      Legacy Compose project {{ legacy_project.friend_name }} exists
      ({{ legacy_project.container_count }} containers,
      {{ legacy_project.network_count }} networks). Inspect it and run
      docker compose --project-name {{ legacy_project.friend_name }}
      --file {{
        offsitebuddy_server_root ~ '/friends/' ~ legacy_project.friend_name ~
        '/compose.yaml'
      }} down
      before rerunning; OffsiteBuddy will not remove it automatically.
  loop: "{{ offsitebuddy_server_legacy_compose_summaries | default([]) }}"
  loop_control:
    loop_var: legacy_project
    label: "{{ legacy_project.friend_name }}"

- name: Remove stale friend server stacks before current convergence
  ansible.builtin.import_tasks: cleanup.yml

- name: Check server Compose project identity ownership
  ansible.builtin.import_tasks: project_identity_preflight.yml

- name: Ensure friend stack directories exist
  ansible.builtin.file:
    path: "{{ offsitebuddy_server_root }}/friends/{{ friend_name }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ offsitebuddy_friends | map(attribute='name') | list }}"
  loop_control:
    loop_var: friend_name
    label: "{{ friend_name }}"

- name: Ensure friend tailscale state directories exist
  ansible.builtin.file:
    path: >-
      {{ offsitebuddy_server_root }}/friends/{{ friend_name }}/tailscale-state
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop: "{{ offsitebuddy_friends | map(attribute='name') | list }}"
  loop_control:
    loop_var: friend_name
    label: "{{ friend_name }}"

- name: Mark managed friend stack directories
  ansible.builtin.copy:
    content: "offsitebuddy\n"
    dest: >-
      {{ offsitebuddy_server_root }}/friends/{{ friend_name
      }}/.offsitebuddy-managed
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_friends | map(attribute='name') | list }}"
  loop_control:
    loop_var: friend_name
    label: "{{ friend_name }}"

- name: Write per-friend Tailscale environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ offsitebuddy_server_root }}/friends/{{ friend.name }}/.env"
    owner: root
    group: root
    mode: "0600"
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    loop_var: friend
    label: "{{ friend.name }}"
  no_log: true

- name: Write per-friend htpasswd file
  community.general.htpasswd:
    path: "{{ offsitebuddy_server_root }}/friends/{{ friend.name }}/htpasswd"
    name: "{{ friend.rest_server.username }}"
    password: "{{ friend.rest_server.password }}"
    crypt_scheme: bcrypt
    owner: root
    group: root
    mode: "0600"
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    loop_var: friend
    label: "{{ friend.name }}"
  no_log: true

- name: Write per-friend Compose file
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: >-
      {{ offsitebuddy_server_root }}/friends/{{ friend.name }}/compose.yaml
    owner: root
    group: root
    mode: "0644"
  loop: "{{ offsitebuddy_friends }}"
  loop_control:
    loop_var: friend
    label: "{{ friend.name }}"
  no_log: true

- name: Write append-only maintenance files
  ansible.builtin.template:
    src: "{{ maintenance_item.1.src }}"
    dest: >-
      {{ offsitebuddy_server_root }}/friends/{{ maintenance_item.0.name
      }}/{{ maintenance_item.1.dest }}
    owner: root
    group: root
    mode: "{{ maintenance_item.1.mode }}"
  loop: >-
    {{ offsitebuddy_friends | product([
      {'src': 'compose.maintenance.yaml.j2',
       'dest': 'compose.maintenance.yaml', 'mode': '0644'},
      {'src': 'maintenance-endpoint.sh.j2',
       'dest': 'maintenance-endpoint.sh', 'mode': '0750'}
    ]) | list }}
  loop_control:
    loop_var: maintenance_item
    label: "{{ maintenance_item.0.name | default('unnamed') }}"
  when: >-
    (maintenance_item.0.rest_server.mode | default('append_only')) ==
    'append_only'
  no_log: true

- name: Remove maintenance files for read-write friends
  ansible.builtin.file:
    path: >-
      {{ offsitebuddy_server_root }}/friends/{{ maintenance_cleanup.0.name
      }}/{{ maintenance_cleanup.1 }}
    state: absent
  loop: >-
    {{ offsitebuddy_friends | product([
      'compose.maintenance.yaml', 'maintenance-endpoint.sh'
    ]) | list }}
  loop_control:
    loop_var: maintenance_cleanup
    label: "{{ maintenance_cleanup.0.name | default('unnamed') }}"
  when: >-
    (maintenance_cleanup.0.rest_server.mode | default('append_only')) ==
    'read_write'
  no_log: true

- name: Converge per-friend server stacks
  community.docker.docker_compose_v2:
    project_src: >-
      {{ offsitebuddy_server_root }}/friends/{{ friend_name }}
    project_name: "offsitebuddy-friend-{{ friend_name }}"
    state: present
    pull: missing
  loop: "{{ offsitebuddy_friends | map(attribute='name') | list }}"
  loop_control:
    loop_var: friend_name
    label: "{{ friend_name }}"
  when: offsitebuddy_start_services | bool
