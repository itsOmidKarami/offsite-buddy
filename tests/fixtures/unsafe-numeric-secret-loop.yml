---
- name: Unsafe numeric friend validation
  ansible.builtin.assert:
    that:
      - offsitebuddy_mode_friend.rest_server.password | length > 0
    fail_msg: >-
      Friend {{ offsitebuddy_mode_friend.name }} password
      {{ offsitebuddy_mode_friend.rest_server.password }} is invalid.
  vars:
    offsitebuddy_mode_friend: "{{ offsitebuddy_friends[friend_index] }}"
  loop: "{{ range(0, offsitebuddy_friends | length) | list }}"
  loop_control:
    loop_var: friend_index
    label: "{{ offsitebuddy_mode_friend.rest_server.password }}"
