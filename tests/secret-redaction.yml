---
- name: Exercise client validation secret redaction
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    offsitebuddy_secret_test_base: >-
      {{ playbook_dir | dirname }}/.ansible/tmp/secret-redaction
    offsitebuddy_client_root: "{{ offsitebuddy_secret_test_base }}/jobs"
    offsitebuddy_start_services: false
    offsitebuddy_manage_systemd: false
    offsitebuddy_client_jobs:
      - name: secret_output
        repository: >-
          rest:http://alice:output-rest-password@100.64.0.1:8000/
        tailscale:
          hostname: secret-output-client
          auth_key: output-tailscale-auth-key
        password: output-restic-password
        schedule: "03:30"
        backup_paths:
          - "{{ offsitebuddy_secret_test_base }}/missing-source"
  pre_tasks:
    - name: Remove secret redaction test path
      ansible.builtin.file:
        path: "{{ offsitebuddy_secret_test_base }}"
        state: absent
  roles:
    - role: client
