---
offsitebuddy_server_root: /srv/offsitebuddy
offsitebuddy_default_append_only: true
offsitebuddy_rest_server_image: restic/rest-server:0.14.0

offsitebuddy_friends:
  - name: alice
    quota:
      backend: existing_path
      path: /mnt/ugos-shares/alice-offsite-backup
      size: 2T
      enforced: true
      enforcement_note: "UGOS shared folder quota set to 2 TB."
    tailscale:
      hostname: offsitebuddy-alice
      auth_key: "{{ vault_tailscale_auth_key_alice }}"
    rest_server:
      username: alice
      password: "{{ vault_rest_server_password_alice }}"
      port: 8000
