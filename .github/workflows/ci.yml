---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      MOLECULE_GLOB: molecule/*/molecule.yml
    steps:
      - name: Validate PR title
        if: ${{ github.event_name == 'pull_request' }}
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          type_pattern='feat|fix|perf|revert|docs|test|ci|chore|refactor'
          title_pattern="^(${type_pattern})(\([a-z0-9._/-]+\))?!?: .+"
          if [[ ! "$PR_TITLE" =~ $title_pattern ]]; then
            marker="$(printf '::%s::' error)"
            echo "${marker}PR title must be a conventional commit."
            echo "${marker}Use fix:/feat:/perf: for release-worthy changes."
            echo "${marker}Use docs:/test:/ci:/chore:/refactor: otherwise."
            exit 1
          fi
      - name: Configure git defaults
        run: git config --global init.defaultBranch main
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install tools
        run: |
          uv sync --locked --group dev
          uv run ansible-galaxy collection install -r requirements-dev.yml
      - name: Run pre-commit checks
        run: uv run --locked pre-commit run --all-files
      - name: Run Molecule converge
        run: |
          molecule_schema_filter="$(
            printf '%s%s  Driver docker does not provide a schema.' WARN ING
          )"
          uv run molecule converge --no-report \
            2> >(grep -v -F "$molecule_schema_filter" >&2)
      - name: Run Molecule verify
        run: |
          molecule_schema_filter="$(
            printf '%s%s  Driver docker does not provide a schema.' WARN ING
          )"
          uv run molecule verify --no-report \
            2> >(grep -v -F "$molecule_schema_filter" >&2)
      - name: Run stale cleanup lifecycle
        run: uv run molecule test -s cleanup --no-report
      - name: Run systemd timer lifecycle
        run: uv run molecule test -s systemd --no-report
      - name: Run negative validation checks
        run: >-
          uv run ansible-playbook -i localhost, -c local
          tests/validation-negative.yml
      - name: Run client sidecar render check
        run: >-
          uv run ansible-playbook -i localhost, -c local
          tests/client-sidecar-render.yml
      - name: Run local backup restore smoke
        run: uv run ansible-playbook -i localhost, -c local tests/e2e-local.yml
      - name: Build collection
        run: uv run ansible-galaxy collection build --force
