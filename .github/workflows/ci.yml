---
name: CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install tools
        run: |
          uv sync --locked --group dev
          uv run ansible-galaxy collection install -r requirements-dev.yml
      - name: Run pre-commit checks
        run: uv run --locked pre-commit run --all-files
      - name: Run Molecule converge
        run: uv run molecule converge
      - name: Run Molecule verify
        run: uv run molecule verify
      - name: Run local backup restore smoke
        run: uv run ansible-playbook -i localhost, -c local tests/e2e-local.yml
      - name: Build collection
        run: uv run ansible-galaxy collection build --force
