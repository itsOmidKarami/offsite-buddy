name: Feature request
description: Suggest a focused improvement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: need
    attributes:
      label: What problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
