---
- name: Verify rendered files
  hosts: all
  become: true
  tasks:
    - name: Check server compose exists
      ansible.builtin.stat:
        path: /srv/offsitebuddy/friends/alice/compose.yaml
      register: server_compose

    - name: Check client backup script exists
      ansible.builtin.stat:
        path: /etc/offsitebuddy/jobs/photos_to_bob/backup.sh
      register: client_backup_script

    - name: Check quota path exists
      ansible.builtin.stat:
        path: /tmp/offsitebuddy-alice
      register: quota_path

    - name: Assert expected files and paths exist
      ansible.builtin.assert:
        that:
          - quota_path.stat.isdir
          - server_compose.stat.exists
          - client_backup_script.stat.exists
