---
- name: Verify rendered files
  hosts: all
  become: true
  tasks:
    - name: Read server compose
      ansible.builtin.slurp:
        path: /srv/offsitebuddy/friends/alice/compose.yaml
      register: server_compose

    - name: Read client backup script
      ansible.builtin.slurp:
        path: /etc/offsitebuddy/jobs/photos_to_bob/backup.sh
      register: backup_script

    - name: Read client check timer
      ansible.builtin.slurp:
        path: /etc/systemd/system/offsitebuddy-check-photos_to_bob.timer
      register: check_timer

    - name: Stat client job outputs
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/offsitebuddy/jobs/photos_to_bob/compose.yaml
        - /etc/offsitebuddy/jobs/photos_to_bob/excludes
        - /etc/offsitebuddy/jobs/photos_to_bob/init.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/check.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/restore-latest.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/snapshots.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/stats.sh
      register: client_output_stats

    - name: Stat client secret files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/offsitebuddy/jobs/photos_to_bob/.env
        - /etc/offsitebuddy/jobs/photos_to_bob/password
      register: client_secret_stats

    - name: Stat systemd units
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/systemd/system/offsitebuddy-backup-photos_to_bob.service
        - /etc/systemd/system/offsitebuddy-backup-photos_to_bob.timer
        - /etc/systemd/system/offsitebuddy-check-photos_to_bob.service
        - /etc/systemd/system/offsitebuddy-check-photos_to_bob.timer
      register: unit_stats

    - name: Assert rendered server and client files
      ansible.builtin.assert:
        that:
          - >-
            'tailscale/tailscale:stable' in
            (server_compose.content | b64decode)
          - >-
            '--append-only' in (server_compose.content | b64decode)
          - >-
            'curl -fsS' in (backup_script.content | b64decode)
          - >-
            'OnCalendar=weekly' in (check_timer.content | b64decode)
          - client_output_stats.results | map(attribute='stat.exists') | min
          - >-
            client_secret_stats.results | map(attribute='stat.mode') | list
            == ['0600', '0600']
          - unit_stats.results | map(attribute='stat.exists') | min
