---
- name: Verify rendered files
  hosts: all
  become: true
  tasks:
    - name: Read server compose
      ansible.builtin.slurp:
        path: /srv/offsitebuddy/friends/alice/compose.yaml
      register: server_compose

    - name: Read read-write server compose
      ansible.builtin.slurp:
        path: /srv/offsitebuddy/friends/bob/compose.yaml
      register: read_write_server_compose

    - name: Read client backup script
      ansible.builtin.slurp:
        path: /etc/offsitebuddy/jobs/photos_to_bob/backup.sh
      register: backup_script

    - name: Read client compose
      ansible.builtin.slurp:
        path: /etc/offsitebuddy/jobs/photos_to_bob/compose.yaml
      register: client_compose

    - name: Read client check timer
      ansible.builtin.slurp:
        path: /etc/systemd/system/offsitebuddy-check-photos_to_bob.timer
      register: check_timer

    - name: Stat client job outputs
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/offsitebuddy/jobs/photos_to_bob/compose.yaml
        - /etc/offsitebuddy/jobs/photos_to_bob/excludes
        - /etc/offsitebuddy/jobs/photos_to_bob/init.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/check.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/restore-latest.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/snapshots.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/stats.sh
      register: client_output_stats

    - name: Stat client secret files
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/offsitebuddy/jobs/photos_to_bob/.env
        - /etc/offsitebuddy/jobs/photos_to_bob/password
      register: client_secret_stats

    - name: Stat systemd units
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - /etc/systemd/system/offsitebuddy-backup-photos_to_bob.service
        - /etc/systemd/system/offsitebuddy-backup-photos_to_bob.timer
        - /etc/systemd/system/offsitebuddy-check-photos_to_bob.service
        - /etc/systemd/system/offsitebuddy-check-photos_to_bob.timer
      register: unit_stats

    - name: Verify helper script syntax
      ansible.builtin.command:
        cmd: "bash -n {{ item }}"
      loop:
        - /etc/offsitebuddy/jobs/photos_to_bob/backup.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/init.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/check.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/restore-latest.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/snapshots.sh
        - /etc/offsitebuddy/jobs/photos_to_bob/stats.sh
      changed_when: false

    - name: Normalize rendered server Compose files
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-name
          - "offsitebuddy-verify-{{ item.name }}"
          - -f
          - "-"
          - config
        stdin: "{{ item.content | b64decode }}"
      loop:
        - name: alice
          content: "{{ server_compose.content }}"
        - name: bob
          content: "{{ read_write_server_compose.content }}"
      loop_control:
        label: "{{ item.name }}"
      register: normalized_server_composes
      delegate_to: localhost
      become: false
      environment:
        TS_AUTHKEY: molecule-compose-validation
      changed_when: false

    - name: Check systemd-analyze availability
      ansible.builtin.command:
        cmd: systemd-analyze --version
      register: systemd_analyze_check
      failed_when: false
      changed_when: false

    - name: Verify rendered systemd unit syntax when available
      ansible.builtin.command:
        cmd: >-
          systemd-analyze verify
          /etc/systemd/system/offsitebuddy-backup-photos_to_bob.service
          /etc/systemd/system/offsitebuddy-backup-photos_to_bob.timer
          /etc/systemd/system/offsitebuddy-check-photos_to_bob.service
          /etc/systemd/system/offsitebuddy-check-photos_to_bob.timer
      when: systemd_analyze_check.rc == 0
      changed_when: false

    - name: Parse rendered Compose files
      ansible.builtin.set_fact:
        server_yaml: "{{ server_compose.content | b64decode | from_yaml }}"
        normalized_server_yaml: >-
          {{ normalized_server_composes.results[0].stdout | from_yaml }}
        normalized_read_write_server_yaml: >-
          {{ normalized_server_composes.results[1].stdout | from_yaml }}
        client_yaml: "{{ client_compose.content | b64decode | from_yaml }}"

    - name: Assert rendered server and client files
      ansible.builtin.assert:
        that:
          - >-
            server_yaml.services.tailscale.image ==
            'tailscale/tailscale:stable'
          - >-
            server_yaml.services.tailscale.environment.TS_USERSPACE ==
            'false'
          - >-
            server_yaml.services.tailscale.devices ==
            ['/dev/net/tun:/dev/net/tun']
          - >-
            'NET_RAW' in server_yaml.services.tailscale.cap_add
          - >-
            normalized_server_yaml.services['rest-server'].environment.OPTIONS
            is search('--append-only')
          - >-
            normalized_read_write_server_yaml.services['rest-server'].environment.OPTIONS
            is not search('--append-only')
          - >-
            normalized_read_write_server_yaml.services['rest-server'].environment.OPTIONS
            is not search('--read-write')
          - >-
            normalized_read_write_server_yaml.services['rest-server'].environment.OPTIONS
            is search('--listen :8001')
          - >-
            normalized_read_write_server_yaml.services['rest-server'].environment.PASSWORD_FILE
            == '/run/secrets/htpasswd'
          - >-
            normalized_read_write_server_yaml.services['rest-server'].network_mode
            == 'service:tailscale'
          - >-
            normalized_read_write_server_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-bob')
            | list | length == 1
          - >-
            normalized_read_write_server_yaml.services['rest-server'].volumes
            | selectattr('target', 'equalto', '/run/secrets/htpasswd')
            | selectattr('read_only', 'equalto', true)
            | list | length == 1
          - >-
            client_yaml.services.restic.entrypoint == ['restic']
          - >-
            client_yaml.services.tailscale.image ==
            'tailscale/tailscale:stable'
          - >-
            client_yaml.services.tailscale.environment.TS_HOSTNAME ==
            'offsitebuddy-client-photos'
          - >-
            client_yaml.services.tailscale.environment.TS_USERSPACE ==
            'false'
          - >-
            client_yaml.services.restic.network_mode == 'service:tailscale'
          - >-
            client_yaml.services.tailscale.devices ==
            ['/dev/net/tun:/dev/net/tun']
          - >-
            'NET_RAW' in client_yaml.services.tailscale.cap_add
          - >-
            'curl -fsS' in (backup_script.content | b64decode)
          - >-
            'OnCalendar=weekly' in (check_timer.content | b64decode)
          - client_output_stats.results | map(attribute='stat.exists') | min
          - >-
            client_secret_stats.results | map(attribute='stat.mode') | list
            == ['0600', '0600']
          - unit_stats.results | map(attribute='stat.exists') | min

    - name: Verify access-mode transitions
      ansible.builtin.import_tasks: tasks/verify_access_modes.yml
