---
- name: Converge
  hosts: all
  become: true
  vars:
    offsitebuddy_start_services: false
    offsitebuddy_friends:
      - name: alice
        quota:
          path: /tmp/offsitebuddy-alice
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-alice
          auth_key: test-auth-key
        rest_server:
          username: alice
          password: test-rest-server-password
          port: 8000
      - name: bob
        quota:
          path: /tmp/offsitebuddy-bob
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-bob
          auth_key: test-bob-auth-key
        rest_server:
          username: bob
          password: test-bob-rest-server-password
          port: 8001
          mode: read_write
    offsitebuddy_client_jobs:
      - name: photos_to_bob
        repository: >-
          rest:http://alice:test-rest-server-password@offsitebuddy-alice:8000/
        tailscale:
          hostname: offsitebuddy-client-photos
          auth_key: test-client-auth-key
        password: test-restic-password
        init_if_missing: false
        run_initial_backup: false
        schedule: "03:30"
        backup_paths:
          - /tmp/offsitebuddy-source
        excludes:
          - /tmp/offsitebuddy-source/.cache
        heartbeat:
          start_url: ""
          success_url: ""
          failure_url: ""
  pre_tasks:
    - name: Create test quota paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/offsitebuddy-alice
        - /tmp/offsitebuddy-bob
    - name: Create test source path
      ansible.builtin.file:
        path: /tmp/offsitebuddy-source
        state: directory
        mode: "0755"
  roles:
    - role: itsomidkarami.offsitebuddy.server
    - role: itsomidkarami.offsitebuddy.client
