---
- name: Capture access-mode credential files before transitions
  ansible.builtin.stat:
    path: "/srv/offsitebuddy/friends/{{ item }}/htpasswd"
    checksum_algorithm: sha256
  loop:
    - alice
    - bob
  register: access_mode_credentials_before

- name: Exercise both access-mode transition directions
  block:
    - name: Apply transitioned access modes
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.server
      vars:
        offsitebuddy_start_services: false
        offsitebuddy_friends:
          - name: alice
            quota:
              path: /tmp/offsitebuddy-alice
              enforced: true
              enforcement_note: "Test path acts as quota-managed storage."
            tailscale:
              hostname: offsitebuddy-alice
              auth_key: test-auth-key
            rest_server:
              username: alice
              password: test-rest-server-password
              port: 8000
              mode: read_write
          - name: bob
            quota:
              path: /tmp/offsitebuddy-bob
              enforced: true
              enforcement_note: "Test path acts as quota-managed storage."
            tailscale:
              hostname: offsitebuddy-bob
              auth_key: test-bob-auth-key
            rest_server:
              username: bob
              password: test-bob-rest-server-password
              port: 8001
              mode: append_only

    - name: Read transitioned access-mode Compose files
      ansible.builtin.slurp:
        path: "/srv/offsitebuddy/friends/{{ item }}/compose.yaml"
      loop:
        - alice
        - bob
      register: transitioned_access_mode_composes

    - name: Capture access-mode credential files after transitions
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}/htpasswd"
        checksum_algorithm: sha256
      loop:
        - alice
        - bob
      register: access_mode_credentials_after

    - name: Parse transitioned access-mode Compose files
      ansible.builtin.set_fact:
        transitioned_alice_yaml: >-
          {{
            transitioned_access_mode_composes.results[0].content
            | b64decode | from_yaml
          }}
        transitioned_bob_yaml: >-
          {{
            transitioned_access_mode_composes.results[1].content
            | b64decode | from_yaml
          }}

    - name: Assert isolated bidirectional access-mode transitions
      ansible.builtin.assert:
        that:
          - >-
            transitioned_alice_yaml.services['rest-server'].environment.OPTIONS
            is not search('--append-only')
          - >-
            transitioned_alice_yaml.services['rest-server'].environment.OPTIONS
            is not search('--read-write')
          - >-
            transitioned_bob_yaml.services['rest-server'].environment.OPTIONS
            is search('--append-only')
          - >-
            transitioned_alice_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-alice')
            | list | length == 1
          - >-
            transitioned_bob_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-bob')
            | list | length == 1
          - >-
            (
              access_mode_credentials_after.results
              | map(attribute='stat.checksum') | list
            ) == (
              access_mode_credentials_before.results
              | map(attribute='stat.checksum') | list
            )
  always:
    - name: Restore initial access modes after transition verification
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.server
      vars:
        offsitebuddy_start_services: false
        offsitebuddy_friends:
          - name: alice
            quota:
              path: /tmp/offsitebuddy-alice
              enforced: true
              enforcement_note: "Test path acts as quota-managed storage."
            tailscale:
              hostname: offsitebuddy-alice
              auth_key: test-auth-key
            rest_server:
              username: alice
              password: test-rest-server-password
              port: 8000
          - name: bob
            quota:
              path: /tmp/offsitebuddy-bob
              enforced: true
              enforcement_note: "Test path acts as quota-managed storage."
            tailscale:
              hostname: offsitebuddy-bob
              auth_key: test-bob-auth-key
            rest_server:
              username: bob
              password: test-bob-rest-server-password
              port: 8001
              mode: read_write
