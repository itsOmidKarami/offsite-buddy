---
- name: Define access-mode verification states
  ansible.builtin.set_fact:
    access_mode_initial_friends:
      - name: alice
        quota:
          path: /tmp/offsitebuddy-alice
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-alice
          auth_key: test-auth-key
        rest_server:
          username: alice
          password: test-rest-server-password
          port: 8000
      # Exact current converge fixture; used for final restoration.
      - name: bob
        quota:
          path: /tmp/offsitebuddy-bob
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-bob
          auth_key: test-bob-server-auth-key
        rest_server:
          username: bob
          password: test-bob-rest-password
          port: 8100
    access_mode_transitioned_friends:
      - name: alice
        quota:
          path: /tmp/offsitebuddy-alice
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-alice
          auth_key: test-auth-key
        rest_server:
          username: alice
          password: test-rest-server-password
          port: 8000
          mode: read_write
      - name: bob
        quota:
          path: /tmp/offsitebuddy-bob
          enforced: true
          enforcement_note: "Test path acts as quota-managed storage."
        tailscale:
          hostname: offsitebuddy-bob
          auth_key: test-bob-server-auth-key
        rest_server:
          username: bob
          password: test-bob-rest-password
          port: 8100
          mode: append_only
    access_mode_credential_paths:
      - alice/htpasswd
      - alice/.env
      - bob/htpasswd
      - bob/.env
    access_mode_artifact_paths:
      - alice/compose.yaml
      - alice/htpasswd
      - alice/.env
      - bob/compose.yaml
      - bob/htpasswd
      - bob/.env
    access_mode_stable_state_paths:
      - alice/compose.yaml
      - alice/.env
      - bob/compose.yaml
      - bob/.env
  no_log: true

- name: Define two-mode access baseline
  ansible.builtin.set_fact:
    access_mode_baseline_friends:
      - >-
        {{
          access_mode_initial_friends[0] | combine({
            'rest_server': access_mode_initial_friends[0].rest_server
            | combine({'mode': 'append_only'})
          })
        }}
      - >-
        {{
          access_mode_initial_friends[1] | combine({
            'rest_server': access_mode_initial_friends[1].rest_server
            | combine({'mode': 'read_write'})
          })
        }}
  no_log: true

- name: Capture converged access-mode files before transitions
  ansible.builtin.stat:
    path: "/srv/offsitebuddy/friends/{{ item }}"
    checksum_algorithm: sha256
  loop: "{{ access_mode_stable_state_paths }}"
  register: access_mode_converged_files_before

- name: Seed two-mode access baseline
  ansible.builtin.include_role:
    name: itsomidkarami.offsitebuddy.server
  vars:
    offsitebuddy_start_services: false
    offsitebuddy_friends: "{{ access_mode_baseline_friends }}"

- name: Capture access-mode credential files before transitions
  ansible.builtin.stat:
    path: "/srv/offsitebuddy/friends/{{ item }}"
    checksum_algorithm: sha256
  loop: "{{ access_mode_credential_paths }}"
  register: access_mode_credentials_before

- name: Exercise both access-mode transition directions
  block:
    - name: Apply transitioned access modes
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.server
      vars:
        offsitebuddy_start_services: false
        offsitebuddy_friends: "{{ access_mode_transitioned_friends }}"

    - name: Capture access-mode files after transitions
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ access_mode_artifact_paths }}"
      register: access_mode_files_after

    - name: Apply transitioned access modes again
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.server
      vars:
        offsitebuddy_start_services: false
        offsitebuddy_friends: "{{ access_mode_transitioned_friends }}"

    - name: Capture access-mode credential files after repeat
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ access_mode_credential_paths }}"
      register: access_mode_credentials_after_repeat

    - name: Capture access-mode files after repeat
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ access_mode_artifact_paths }}"
      register: access_mode_files_after_repeat

    - name: Read transitioned access-mode Compose files
      ansible.builtin.slurp:
        path: "/srv/offsitebuddy/friends/{{ item }}/compose.yaml"
      loop:
        - alice
        - bob
      register: transitioned_access_mode_composes

    - name: Normalize transitioned access-mode Compose files
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-name
          - "offsitebuddy-transitioned-{{ item.item }}"
          - -f
          - "-"
          - config
        stdin: "{{ item.content | b64decode }}"
      loop: "{{ transitioned_access_mode_composes.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: normalized_transitioned_access_mode_composes
      delegate_to: localhost
      become: false
      environment:
        TS_AUTHKEY: molecule-compose-validation
      changed_when: false

    - name: Parse transitioned access-mode Compose files
      ansible.builtin.set_fact:
        transitioned_alice_yaml: >-
          {{
            normalized_transitioned_access_mode_composes.results[0].stdout
            | from_yaml
          }}
        transitioned_bob_yaml: >-
          {{
            normalized_transitioned_access_mode_composes.results[1].stdout
            | from_yaml
          }}

    - name: Assert isolated repeatable access-mode transitions
      ansible.builtin.assert:
        that:
          - >-
            transitioned_alice_yaml.services['rest-server'].environment.OPTIONS
            is not search('--append-only')
          - >-
            transitioned_bob_yaml.services['rest-server'].environment.OPTIONS
            is search('--append-only')
          - >-
            transitioned_alice_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-alice')
            | list | length == 1
          - >-
            transitioned_bob_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-bob')
            | list | length == 1
          - >-
            (
              access_mode_credentials_after_repeat.results
              | map(attribute='stat.checksum') | list
            ) == (
              access_mode_credentials_before.results
              | map(attribute='stat.checksum') | list
            )
          - >-
            (
              access_mode_files_after_repeat.results
              | map(attribute='stat.checksum') | list
            ) == (
              access_mode_files_after.results
              | map(attribute='stat.checksum') | list
            )
  always:
    - name: Restore initial access modes after transition verification
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.server
      vars:
        offsitebuddy_start_services: false
        offsitebuddy_friends: "{{ access_mode_initial_friends }}"

    - name: Read restored access-mode Compose files
      ansible.builtin.slurp:
        path: "/srv/offsitebuddy/friends/{{ item }}/compose.yaml"
      loop:
        - alice
        - bob
      register: restored_access_mode_composes

    - name: Normalize restored access-mode Compose files
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - --project-name
          - "offsitebuddy-restored-{{ item.item }}"
          - -f
          - "-"
          - config
        stdin: "{{ item.content | b64decode }}"
      loop: "{{ restored_access_mode_composes.results }}"
      loop_control:
        label: "{{ item.item }}"
      register: normalized_restored_access_mode_composes
      delegate_to: localhost
      become: false
      environment:
        TS_AUTHKEY: molecule-compose-validation
      changed_when: false

    - name: Capture restored access-mode credential files
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ access_mode_credential_paths }}"
      register: restored_access_mode_credentials

    - name: Capture restored access-mode files
      ansible.builtin.stat:
        path: "/srv/offsitebuddy/friends/{{ item }}"
        checksum_algorithm: sha256
      loop: "{{ access_mode_stable_state_paths }}"
      register: restored_access_mode_files

    - name: Verify restored REST credentials remain isolated
      ansible.builtin.command:
        argv:
          - python3
          - -c
          - >-
            from passlib.apache import HtpasswdFile; import sys;
            raise SystemExit(0 if HtpasswdFile(sys.argv[1]).check_password(
            sys.argv[2], sys.argv[3]) else 1)
          - "/srv/offsitebuddy/friends/{{ item.name }}/htpasswd"
          - "{{ item.name }}"
          - "{{ item.password }}"
      loop:
        - name: alice
          password: test-rest-server-password
        - name: bob
          password: test-bob-rest-password
      loop_control:
        label: "{{ item.name }}"
      register: restored_access_mode_auth_checks
      changed_when: false
      no_log: true

    - name: Parse restored access-mode Compose files
      ansible.builtin.set_fact:
        restored_alice_yaml: >-
          {{
            normalized_restored_access_mode_composes.results[0].stdout
            | from_yaml
          }}
        restored_bob_yaml: >-
          {{
            normalized_restored_access_mode_composes.results[1].stdout
            | from_yaml
          }}

    - name: Assert restored access modes and credentials
      ansible.builtin.assert:
        that:
          - >-
            restored_alice_yaml.services['rest-server'].environment.OPTIONS
            is search('--append-only')
          - >-
            restored_bob_yaml.services['rest-server'].environment.OPTIONS
            is search('--append-only')
          - >-
            restored_bob_yaml.services['rest-server'].environment.OPTIONS
            is search('--listen :8100')
          - >-
            restored_alice_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-alice')
            | list | length == 1
          - >-
            restored_bob_yaml.services['rest-server'].volumes
            | selectattr('source', 'equalto', '/tmp/offsitebuddy-bob')
            | list | length == 1
          - >-
            (
              restored_access_mode_credentials.results
              | map(attribute='stat.checksum') | list
            ) == (
              access_mode_credentials_before.results
              | map(attribute='stat.checksum') | list
            )
          - >-
            (
              restored_access_mode_files.results
              | map(attribute='stat.checksum') | list
            ) == (
              access_mode_converged_files_before.results
              | map(attribute='stat.checksum') | list
            )
          - >-
            restored_access_mode_auth_checks.results
            | map(attribute='rc') | list == [0, 0]
