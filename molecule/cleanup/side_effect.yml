              image: alpine:3.20
              command: ["true"]

    - name: Create service for unloaded active state fixture
      ansible.builtin.copy:
        dest: >-
          /etc/systemd/system/offsitebuddy-backup-{{
          client_unloaded_active_job }}.service
        mode: "0644"
        content: |
          [Unit]
          Description=OffsiteBuddy unloaded active cleanup fixture

          [Service]
          Type=simple
          ExecStart=/bin/sleep infinity

    - name: Reload systemd for unloaded active state fixture
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Start service for unloaded active state fixture
      ansible.builtin.systemd:
        name: >-
          offsitebuddy-backup-{{ client_unloaded_active_job }}.service
        state: started

    - name: Remove active service unit file
      ansible.builtin.file:
        path: >-
          /etc/systemd/system/offsitebuddy-backup-{{
          client_unloaded_active_job }}.service
        state: absent

    - name: Reload systemd after removing active service unit file
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Query unloaded active service state
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - --property=LoadState
          - --property=ActiveState
          - >-
            offsitebuddy-backup-{{ client_unloaded_active_job }}.service
      register: unloaded_active_state
      changed_when: false

    - name: Verify unloaded active service fixture
      ansible.builtin.assert:
        that:
          - "'LoadState=not-found' in unloaded_active_state.stdout_lines"
          - "'ActiveState=active' in unloaded_active_state.stdout_lines"

    - name: Run cleanup against unloaded active service
      ansible.builtin.include_role:
        name: client
        tasks_from: main.yml
      vars:
        offsitebuddy_client_root: "{{ client_unloaded_active_root }}"
        offsitebuddy_client_jobs: []
        offsitebuddy_cleanup_stale: true
        offsitebuddy_start_services: true
        offsitebuddy_manage_systemd: true

    - name: Check unloaded active managed directory was removed
      ansible.builtin.stat:
        path: >-
          {{ client_unloaded_active_root }}/{{ client_unloaded_active_job }}
      register: unloaded_active_directory

    - name: Query cleaned unloaded service state
      ansible.builtin.command:
        argv:
          - systemctl
          - show
          - --property=ActiveState
          - --value
          - >-
            offsitebuddy-backup-{{ client_unloaded_active_job }}.service
      register: cleaned_unloaded_active_state
      changed_when: false

    - name: Verify unloaded active service stopped before deletion
      ansible.builtin.assert:
        that:
          - not unloaded_active_directory.stat.exists
          - cleaned_unloaded_active_state.stdout == 'inactive'
