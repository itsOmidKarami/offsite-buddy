---
- name: Exercise stale cleanup failure preservation
  hosts: all
  become: true
  environment:
    DOCKER_HOST: >-
      {{ lookup('env', 'MOLECULE_DOCKER_HOST') |
      default('unix:///docker.sock', true) }}
  vars:
    server_validation_root: >-
      /srv/offsitebuddy-cleanup-side-effect/server-validation
    client_validation_root: >-
      /etc/offsitebuddy-cleanup-side-effect/client-validation
    current_legacy_root: >-
      /srv/offsitebuddy-cleanup-side-effect/current-legacy
    current_legacy_friend: >-
      cleanup-current-legacy-{{ ansible_facts['hostname'] }}
    current_legacy_quota: >-
      /tmp/offsitebuddy-cleanup-side-effect-current-legacy-quota
    current_client_legacy_root: >-
      /etc/offsitebuddy-cleanup-side-effect/current-client-legacy
    current_client_legacy_job: >-
      cleanup-current-client-legacy-{{ ansible_facts['hostname'] }}
    current_client_legacy_source: >-
      /tmp/offsitebuddy-cleanup-side-effect-current-client-source
    server_shadow_root: >-
      /srv/offsitebuddy-cleanup-side-effect/server-shadow
    server_shadow_current: >-
      cleanup-shadow-server-current-{{ ansible_facts['hostname'] }}
    server_shadow_legacy: "offsitebuddy-friend-{{ server_shadow_current }}"
    server_maintenance_shadow_legacy: >-
      offsitebuddy-maintenance-friend-{{ server_shadow_current }}
    server_shadow_quota: >-
      /tmp/offsitebuddy-cleanup-side-effect-server-shadow-quota
    client_shadow_root: >-
      /etc/offsitebuddy-cleanup-side-effect/client-shadow
    client_shadow_current: >-
      cleanup-shadow-client-current-{{ ansible_facts['hostname'] }}
    client_shadow_legacy: "offsitebuddy-client-{{ client_shadow_current }}"
    client_shadow_source: >-
      /tmp/offsitebuddy-cleanup-side-effect-client-shadow-source
    stale_legacy_root: >-
      /srv/offsitebuddy-cleanup-side-effect/stale-legacy
    stale_legacy_friend: >-
      cleanup-stale-legacy-{{ ansible_facts['hostname'] }}
    stale_client_legacy_root: >-
      /etc/offsitebuddy-cleanup-side-effect/stale-client-legacy
    stale_client_legacy_job: >-
      cleanup-stale-client-legacy-{{ ansible_facts['hostname'] }}
    legacy_teardown_root: /tmp/offsitebuddy-cleanup-side-effect-teardown
    server_stop_failure_root: >-
      /srv/offsitebuddy-cleanup-side-effect/server-stop-failure
    client_stop_failure_root: >-
      /etc/offsitebuddy-cleanup-side-effect/client-stop-failure
    server_stop_failure_friend: >-
      cleanup-invalid-compose-{{ ansible_facts['hostname'] }}
    client_stop_failure_job: >-
      cleanup-refuse-stop-{{ ansible_facts['hostname'] }}
    client_unloaded_active_root: >-
      /etc/offsitebuddy-cleanup-side-effect/client-unloaded-active
    client_unloaded_active_job: >-
      cleanup-unloaded-active-{{ ansible_facts['hostname'] }}
    cleanup_fixture_project_names:
      - "{{ current_legacy_friend }}"
      - "{{ stale_legacy_friend }}"
      - "{{ current_client_legacy_job }}"
      - "{{ stale_client_legacy_job }}"
      - "{{ server_shadow_legacy }}"
      - "{{ server_maintenance_shadow_legacy }}"
      - "{{ client_shadow_legacy }}"
      - "offsitebuddy-client-{{ client_unloaded_active_job }}"
  tasks:
    - name: Create validation sentinel directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ server_validation_root }}/friends/stale"
        - "{{ client_validation_root }}/stale"

    - name: Create validation sentinels and managed markers
      ansible.builtin.copy:
        dest: "{{ item }}"
        content: preserved
        mode: "0600"
      loop:
        - "{{ server_validation_root }}/friends/stale/.offsitebuddy-managed"
        - "{{ server_validation_root }}/friends/stale/sentinel"
        - "{{ client_validation_root }}/stale/.offsitebuddy-managed"
        - "{{ client_validation_root }}/stale/sentinel"

    - name: Require server main to reject unsafe cleanup before side effects
      block:
        - name: Invoke server main with unsafe cleanup configuration
          ansible.builtin.include_role:
            name: server
            tasks_from: main.yml
          vars:
            offsitebuddy_server_root: "{{ server_validation_root }}"
            offsitebuddy_friends: []
            offsitebuddy_cleanup_stale: true
            offsitebuddy_start_services: false

        - name: Fail if unsafe server cleanup passes validation
          ansible.builtin.fail:
            msg: Unsafe server cleanup unexpectedly passed validation.
      rescue:
        - name: Assert server cleanup failed at validation
          ansible.builtin.assert:
            that:
              - >-
                ansible_failed_task.name is search(
                  'Validate stale server cleanup can stop managed stacks'
                )
              - >-
                ansible_failed_result.msg is search(
                  'offsitebuddy_cleanup_stale requires'
                )

    - name: Require client main to reject unsafe cleanup before side effects
      block:
        - name: Invoke client main with unsafe cleanup configuration
          ansible.builtin.include_role:
            name: client
            tasks_from: main.yml
          vars:
            offsitebuddy_client_root: "{{ client_validation_root }}"
            offsitebuddy_client_jobs: []
            offsitebuddy_cleanup_stale: true
            offsitebuddy_start_services: false
            offsitebuddy_manage_systemd: true

        - name: Fail if unsafe client cleanup passes validation
          ansible.builtin.fail:
            msg: Unsafe client cleanup unexpectedly passed validation.
      rescue:
        - name: Assert client cleanup failed at validation
          ansible.builtin.assert:
            that:
              - >-
                ansible_failed_task.name is search(
                  'Validate stale client cleanup can stop managed units'
                )
              - >-
                ansible_failed_result.msg is search(
                  'offsitebuddy_cleanup_stale requires'
                )

    - name: Check validation sentinels after rejected role runs
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ server_validation_root }}/friends/stale/sentinel"
        - "{{ client_validation_root }}/stale/sentinel"
      register: validation_sentinels

    - name: Verify validation failures preserved sentinels
      ansible.builtin.assert:
        that:
          - validation_sentinels.results | map(attribute='stat.exists') | min

    - name: Create external legacy fixture teardown directory
      ansible.builtin.file:
        path: "{{ legacy_teardown_root }}"
        state: directory
        mode: "0755"

    - name: Create external legacy fixture teardown definition
      ansible.builtin.copy:
        dest: "{{ legacy_teardown_root }}/compose.yaml"
        mode: "0600"
        content: |
          ---
          services:
            fixture:
              image: alpine:3.20
              command: ["sleep", "infinity"]

    - name: Check side-effect fixture project names are unused
      community.docker.docker_host_info:
        containers: true
        containers_all: true
        containers_filters:
          label: "com.docker.compose.project={{ project_name }}"
        networks: true
        networks_filters:
          label: "com.docker.compose.project={{ project_name }}"
      loop: "{{ cleanup_fixture_project_names }}"
      loop_control:
        loop_var: project_name
        label: "{{ project_name }}"
      register: cleanup_fixture_project_inspections
      no_log: true

    - name: Initialize side-effect fixture project summaries
      ansible.builtin.set_fact:
        cleanup_fixture_project_summaries: []
      no_log: true

    - name: Project side-effect fixture inspections
      ansible.builtin.set_fact:
        cleanup_fixture_project_summaries: >-
          {{
            cleanup_fixture_project_summaries +
            [{
              'project_name': fixture_inspection.project_name,
              'container_count': fixture_inspection.containers | length,
              'network_count': fixture_inspection.networks | length
            }]
          }}
      loop: "{{ cleanup_fixture_project_inspections.results }}"
      loop_control:
        loop_var: fixture_inspection
        label: "{{ fixture_inspection.project_name }}"
      no_log: true

    - name: Refuse to overwrite side-effect fixture projects
      ansible.builtin.assert:
        that:
          - fixture_project.container_count == 0
          - fixture_project.network_count == 0
        fail_msg: >-
          Cleanup fixture project {{ fixture_project.project_name }} already
          exists on the Docker daemon; refusing to alter it.
      loop: "{{ cleanup_fixture_project_summaries }}"
      loop_control:
        loop_var: fixture_project
        label: "{{ fixture_project.project_name }}"

    - name: Exercise server identity shadow refusal with cleanup disabled
      block:
        - name: Create server identity shadow directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy }}
            - "{{ server_shadow_quota }}"

        - name: Create server identity shadow managed files
          ansible.builtin.copy:
            dest: >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/{{ item }}
            content: preserved
            mode: "0600"
          loop:
            - .offsitebuddy-managed
            - sentinel

        - name: Create server identity shadow Compose definition
          ansible.builtin.copy:
            dest: >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/compose.yaml
            mode: "0600"
            content: |
              ---
              services:
                fixture:
                  image: alpine:3.20
                  command: ["sleep", "infinity"]
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}
              networks:
                default:
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}

        - name: Start server identity shadow Compose project
          community.docker.docker_compose_v2:
            project_src: >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy }}
            project_name: "{{ server_shadow_legacy }}"
            files:
              - compose.yaml
            state: present

        - name: Record server identity shadow Compose checksum
          ansible.builtin.stat:
            path: >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/compose.yaml
            get_checksum: true
          register: server_shadow_compose_before

        - name: Require server identity shadow refusal with cleanup disabled
          block:
            - name: Invoke server main against a managed identity shadow
              ansible.builtin.include_role:
                name: server
                tasks_from: main.yml
              vars:
                offsitebuddy_server_root: "{{ server_shadow_root }}"
                offsitebuddy_cleanup_stale: false
                offsitebuddy_start_services: true
                offsitebuddy_friends:
                  - name: "{{ server_shadow_current }}"
                    quota:
                      path: "{{ server_shadow_quota }}"
                      enforced: true
                      enforcement_note: Molecule identity shadow fixture
                    tailscale:
                      hostname: "{{ server_shadow_current }}"
                      auth_key: molecule-server-shadow-auth-key
                    rest_server:
                      username: cleanup-server-shadow
                      password: cleanup-server-shadow-fixture

            - name: Fail if server identity shadow is accepted
              ansible.builtin.fail:
                msg: Server identity shadow unexpectedly passed preflight.
          rescue:
            - name: Assert server identity shadow refusal is safe
              ansible.builtin.assert:
                that:
                  - >-
                    ansible_failed_task.name is search(
                      'Refuse managed friend names that shadow current '
                      'Compose projects'
                    )
                  - >-
                    (ansible_failed_result | to_json) is search(
                      server_shadow_legacy
                    )

        - name: Check server identity shadow state after refusal
          ansible.builtin.stat:
            path: "{{ item }}"
            get_checksum: true
          loop:
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_current }}
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/.offsitebuddy-managed
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/sentinel
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_legacy
              }}/compose.yaml
          register: server_shadow_files

        - name: Verify server identity shadow refusal preceded writes
          ansible.builtin.assert:
            that:
              - not server_shadow_files.results[0].stat.exists
              - server_shadow_files.results[1].stat.exists
              - server_shadow_files.results[2].stat.exists
              - >-
                server_shadow_files.results[3].stat.checksum ==
                server_shadow_compose_before.stat.checksum
      always:
        - name: Tear down server identity shadow fixture
          community.docker.docker_compose_v2:
            project_src: "{{ legacy_teardown_root }}"
            project_name: "{{ server_shadow_legacy }}"
            files:
              - compose.yaml
            state: absent
            remove_orphans: true

        - name: Inspect server identity shadow fixture resources
          community.docker.docker_host_info:
            containers: true
            containers_all: true
            containers_filters:
              label: "com.docker.compose.project={{ server_shadow_legacy }}"
            networks: true
            networks_filters:
              label: "com.docker.compose.project={{ server_shadow_legacy }}"
          register: server_shadow_fixture_resources

        - name: Verify server identity shadow fixture did not leak
          ansible.builtin.assert:
            that:
              - server_shadow_fixture_resources.containers | length == 0
              - server_shadow_fixture_resources.networks | length == 0

    - name: Exercise server maintenance identity shadow refusal
      vars:
        server_maintenance_shadow_path: >-
          {{
            server_shadow_root ~ '/friends/' ~
            server_maintenance_shadow_legacy
          }}
      block:
        - name: Create server maintenance identity shadow directory
          ansible.builtin.file:
            path: "{{ server_maintenance_shadow_path }}"
            state: directory
            mode: "0755"

        - name: Create server maintenance identity shadow managed files
          ansible.builtin.copy:
            dest: >-
              {{ server_maintenance_shadow_path }}/{{ item }}
            content: preserved
            mode: "0600"
          loop:
            - .offsitebuddy-managed
            - sentinel

        - name: Create server maintenance identity shadow Compose definition
          ansible.builtin.copy:
            dest: >-
              {{ server_maintenance_shadow_path }}/compose.yaml
            mode: "0600"
            content: |
              ---
              services:
                fixture:
                  image: alpine:3.20
                  command: ["sleep", "infinity"]
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}
              networks:
                default:
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}

        - name: Start server maintenance identity shadow Compose project
          community.docker.docker_compose_v2:
            project_src: >-
              {{ server_maintenance_shadow_path }}
            project_name: "{{ server_maintenance_shadow_legacy }}"
            files:
              - compose.yaml
            state: present

        - name: Record server maintenance identity shadow Compose checksum
          ansible.builtin.stat:
            path: >-
              {{ server_maintenance_shadow_path }}/compose.yaml
            get_checksum: true
          register: server_maintenance_shadow_compose_before

        - name: Require server maintenance identity shadow refusal
          block:
            - name: Invoke server main against a maintenance identity shadow
              ansible.builtin.include_role:
                name: server
                tasks_from: main.yml
              vars:
                offsitebuddy_server_root: "{{ server_shadow_root }}"
                offsitebuddy_cleanup_stale: false
                offsitebuddy_start_services: true
                offsitebuddy_friends:
                  - name: "{{ server_shadow_current }}"
                    quota:
                      path: "{{ server_shadow_quota }}"
                      enforced: true
                      enforcement_note: Molecule identity shadow fixture
                    tailscale:
                      hostname: "{{ server_shadow_current }}"
                      auth_key: molecule-server-shadow-auth-key
                    rest_server:
                      username: cleanup-server-shadow
                      password: cleanup-server-shadow-fixture

            - name: Fail if server maintenance identity shadow is accepted
              ansible.builtin.fail:
                msg: >-
                  Server maintenance identity shadow unexpectedly passed
                  preflight.
          rescue:
            - name: Assert server maintenance identity shadow refusal is safe
              ansible.builtin.assert:
                that:
                  - >-
                    ansible_failed_task.name is search(
                      'Refuse managed friend names that shadow current '
                      'Compose projects'
                    )
                  - >-
                    (ansible_failed_result | to_json) is search(
                      server_maintenance_shadow_legacy
                    )

        - name: Check server maintenance identity shadow state after refusal
          ansible.builtin.stat:
            path: "{{ item }}"
            get_checksum: true
          loop:
            - >-
              {{ server_shadow_root }}/friends/{{ server_shadow_current }}
            - >-
              {{ server_maintenance_shadow_path }}/.offsitebuddy-managed
            - >-
              {{ server_maintenance_shadow_path }}/sentinel
            - >-
              {{ server_maintenance_shadow_path }}/compose.yaml
          register: server_maintenance_shadow_files

        - name: Verify server maintenance identity shadow refusal
          ansible.builtin.assert:
            that:
              - not server_maintenance_shadow_files.results[0].stat.exists
              - server_maintenance_shadow_files.results[1].stat.exists
              - server_maintenance_shadow_files.results[2].stat.exists
              - >-
                server_maintenance_shadow_files.results[3].stat.checksum ==
                server_maintenance_shadow_compose_before.stat.checksum
      always:
        - name: Tear down server maintenance identity shadow fixture
          community.docker.docker_compose_v2:
            project_src: "{{ legacy_teardown_root }}"
            project_name: "{{ server_maintenance_shadow_legacy }}"
            files:
              - compose.yaml
            state: absent
            remove_orphans: true

        - name: Inspect server maintenance identity shadow fixture resources
          community.docker.docker_host_info:
            containers: true
            containers_all: true
            containers_filters:
              label: >-
                com.docker.compose.project={{
                server_maintenance_shadow_legacy }}
            networks: true
            networks_filters:
              label: >-
                com.docker.compose.project={{
                server_maintenance_shadow_legacy }}
          register: server_maintenance_shadow_fixture_resources

        - name: Verify server maintenance identity shadow fixture did not leak
          ansible.builtin.assert:
            that:
              - >-
                server_maintenance_shadow_fixture_resources.containers | length
                == 0
              - >-
                server_maintenance_shadow_fixture_resources.networks | length
                == 0

    - name: Exercise client identity shadow refusal with cleanup disabled
      block:
        - name: Create client identity shadow directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - "{{ client_shadow_root }}/{{ client_shadow_legacy }}"
            - "{{ client_shadow_source }}"

        - name: Create client identity shadow managed files
          ansible.builtin.copy:
            dest: >-
              {{ client_shadow_root }}/{{ client_shadow_legacy }}/{{ item }}
            content: preserved
            mode: "0600"
          loop:
            - .offsitebuddy-managed
            - sentinel

        - name: Create client identity shadow Compose definition
          ansible.builtin.copy:
            dest: >-
              {{ client_shadow_root }}/{{ client_shadow_legacy }}/compose.yaml
            mode: "0600"
            content: |
              ---
              services:
                fixture:
                  image: alpine:3.20
                  command: ["sleep", "infinity"]
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}
              networks:
                default:
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}

        - name: Start client identity shadow Compose project
          community.docker.docker_compose_v2:
            project_src: >-
              {{ client_shadow_root }}/{{ client_shadow_legacy }}
            project_name: "{{ client_shadow_legacy }}"
            files:
              - compose.yaml
            state: present

        - name: Record client identity shadow Compose checksum
          ansible.builtin.stat:
            path: >-
              {{ client_shadow_root }}/{{ client_shadow_legacy }}/compose.yaml
            get_checksum: true
          register: client_shadow_compose_before

        - name: Require client identity shadow refusal with cleanup disabled
          block:
            - name: Invoke client main against a managed identity shadow
              ansible.builtin.include_role:
                name: client
                tasks_from: main.yml
              vars:
                offsitebuddy_client_root: "{{ client_shadow_root }}"
                offsitebuddy_cleanup_stale: false
                offsitebuddy_start_services: false
                offsitebuddy_manage_systemd: false
                offsitebuddy_client_jobs:
                  - name: "{{ client_shadow_current }}"
                    repository: rest:http://127.0.0.1:8000/repository
                    password: cleanup-client-shadow-fixture
                    schedule: "03:30"
                    backup_paths:
                      - "{{ client_shadow_source }}"
                    init_if_missing: false
                    run_initial_backup: false

            - name: Fail if client identity shadow is accepted
              ansible.builtin.fail:
                msg: Client identity shadow unexpectedly passed preflight.
          rescue:
            - name: Assert client identity shadow refusal is safe
              ansible.builtin.assert:
                that:
                  - >-
                    ansible_failed_task.name is search(
                      'Refuse managed client names that shadow current '
                      'Compose projects'
                    )
                  - >-
                    (ansible_failed_result | to_json) is search(
                      client_shadow_legacy
                    )

        - name: Check client identity shadow state after refusal
          ansible.builtin.stat:
            path: "{{ item }}"
            get_checksum: true
          loop:
            - "{{ client_shadow_root }}/{{ client_shadow_current }}"
            - >-
              {{ client_shadow_root }}/{{ client_shadow_legacy
              }}/.offsitebuddy-managed
            - "{{ client_shadow_root }}/{{ client_shadow_legacy }}/sentinel"
            - >-
              {{ client_shadow_root }}/{{ client_shadow_legacy }}/compose.yaml
          register: client_shadow_files

        - name: Verify client identity shadow refusal preceded writes
          ansible.builtin.assert:
            that:
              - not client_shadow_files.results[0].stat.exists
              - client_shadow_files.results[1].stat.exists
              - client_shadow_files.results[2].stat.exists
              - >-
                client_shadow_files.results[3].stat.checksum ==
                client_shadow_compose_before.stat.checksum
      always:
        - name: Tear down client identity shadow fixture
          community.docker.docker_compose_v2:
            project_src: "{{ legacy_teardown_root }}"
            project_name: "{{ client_shadow_legacy }}"
            files:
              - compose.yaml
            state: absent
            remove_orphans: true

        - name: Inspect client identity shadow fixture resources
          community.docker.docker_host_info:
            containers: true
            containers_all: true
            containers_filters:
              label: "com.docker.compose.project={{ client_shadow_legacy }}"
            networks: true
            networks_filters:
              label: "com.docker.compose.project={{ client_shadow_legacy }}"
          register: client_shadow_fixture_resources

        - name: Verify client identity shadow fixture did not leak
          ansible.builtin.assert:
            that:
              - client_shadow_fixture_resources.containers | length == 0
              - client_shadow_fixture_resources.networks | length == 0

    - name: Exercise current client generic Compose refusal before job writes
      block:
        - name: Create current client generic Compose and source directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            mode: "0755"
          loop:
            - >-
              {{ current_client_legacy_root }}/{{ current_client_legacy_job }}
            - "{{ current_client_legacy_source }}"

        - name: Create current client generic Compose definition
          ansible.builtin.copy:
            dest: >-
              {{ current_client_legacy_root }}/{{ current_client_legacy_job
              }}/compose.yaml
            mode: "0600"
            content: |
              ---
              services:
                fixture:
                  image: alpine:3.20
                  command: ["sleep", "infinity"]
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}
              networks:
                default:
                  labels:
                    offsitebuddy.cleanup-fixture: >-
                      {{ ansible_facts['hostname'] }}

        - name: Start current client generic Compose project
          community.docker.docker_compose_v2:
            project_src: >-
              {{ current_client_legacy_root }}/{{ current_client_legacy_job }}
            project_name: "{{ current_client_legacy_job }}"
            files:
              - compose.yaml
            state: present

        - name: Record current client generic Compose checksum
          ansible.builtin.stat:
            path: >-
              {{ current_client_legacy_root }}/{{ current_client_legacy_job
              }}/compose.yaml
            get_checksum: true
          register: current_client_legacy_compose_before

        - name: Require current client generic Compose migration refusal
          block:
            - name: Invoke client main with a current generic Compose project
              ansible.builtin.include_role:
                name: client
                tasks_from: main.yml
              vars:
                offsitebuddy_client_root: "{{ current_client_legacy_root }}"
                offsitebuddy_cleanup_stale: false
                offsitebuddy_start_services: true
                offsitebuddy_manage_systemd: true
                offsitebuddy_client_jobs:
