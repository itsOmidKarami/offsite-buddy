---
dependency:
  name: galaxy
  options:
    requirements-file: requirements-dev.yml
driver:
  name: docker
platforms:
  - name: offsitebuddy-systemd
    image: geerlingguy/docker-debian12-ansible:latest
    command: /lib/systemd/systemd
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    pre_build_image: true
provisioner:
  name: ansible
  playbooks:
    converge: converge.yml
    side_effect: side_effect.yml
verifier:
  name: ansible
scenario:
  test_sequence:
    - create
    - converge
    - side_effect
    - verify
    - destroy
