---
- name: Converge systemd timer lifecycle
  hosts: all
  become: true
  environment:
    DOCKER_HOST: >-
      {{ lookup('env', 'MOLECULE_DOCKER_HOST') |
      default('unix:///docker.sock', true) }}
  vars:
    offsitebuddy_client_jobs:
      - name: daily_job
        repository: >-
          rest:http://synthetic:repo-sentinel@unit.invalid/
        password: systemd-restic-password-sentinel
        tailscale:
          hostname: offsitebuddy-systemd-daily
          auth_key: systemd-tailscale-auth-sentinel
        init_if_missing: false
        run_initial_backup: false
        schedule: "03:30"
        backup_paths:
          - /tmp/offsitebuddy-systemd-daily-source
        heartbeat:
          start_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
          success_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
          failure_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
      - name: custom_job
        repository: >-
          rest:http://synthetic:repo-sentinel@unit.invalid/
        password: systemd-restic-password-sentinel
        tailscale:
          hostname: offsitebuddy-systemd-custom
          auth_key: systemd-tailscale-auth-sentinel
        init_if_missing: false
        run_initial_backup: false
        schedule: "04:15"
        backup_paths:
          - /tmp/offsitebuddy-systemd-custom-source
        heartbeat:
          start_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
          success_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
          failure_url: https://unit-leak.invalid/systemd-heartbeat-sentinel
        check:
          enabled: true
          schedule: "Sun *-*-* 05:00:00"
  pre_tasks:
    - name: Create systemd scenario paths
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/offsitebuddy-systemd-daily-source
        - /tmp/offsitebuddy-systemd-custom-source
  tasks:
    - name: Configure systemd timer jobs
      ansible.builtin.include_role:
        name: itsomidkarami.offsitebuddy.client
      no_log: true
